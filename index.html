<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Google Fonts: Unbounded -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Primary SEO Meta Tags -->
    <title>Traikos Finance</title>
    <meta name="description" content="A fast, accessible and SEO-friendly React application." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://example.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:title" content="Traikos Finance" />
    <meta property="og:description" content="A fast, accessible and SEO-friendly React application." />
    <meta property="og:image" content="https://example.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://example.com/" />
    <meta name="twitter:title" content="Traikos Finance" />
    <meta name="twitter:description" content="A fast, accessible and SEO-friendly React application." />
    <meta name="twitter:image" content="https://example.com/og-image.jpg" />
  </head>
  <body>
    <div id="page-overlay" aria-hidden="true" style="position:fixed;inset:0;z-index:5;background-color:rgba(0,0,0,0);pointer-events:none;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
